<!DOCTYPE html>
<html class="light" lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>4D Asistanım - Motivation (Light Pocket Hybrid)</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#f8fbff",
            "surface": "#ffffff",
            "surface-dim": "#f1f4f9",
            "surface-bright": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f4f7fa",
            "surface-container": "#eff2f6",
            "surface-container-high": "#e9edf2",
            "surface-container-highest": "#e3e8ee",
            
            "primary": "#0061a7",
            "primary-container": "#d1e4ff",
            "on-primary": "#ffffff",
            "on-primary-container": "#001d36",
            
            "secondary": "#bc000c",
            "secondary-container": "#ffdad5",
            "on-secondary": "#ffffff",
            "on-secondary-container": "#410001",
            
            "tertiary": "#745b00",
            "tertiary-container": "#ffe08b",
            "on-tertiary": "#ffffff",
            "on-tertiary-container": "#241a00",
            
            "on-surface": "#141d21",
            "on-surface-variant": "#44474e",
            "outline": "#74777f",
            "outline-variant": "#c4c7cf",
            
            "pocket-bg": "#111125",
            "pocket-on": "#e2e0fc",
            "pocket-variant": "#bec8d1",
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans", "sans-serif"],
            "body": ["Be Vietnam Pro", "sans-serif"],
            "label": ["Be Vietnam Pro", "sans-serif"]
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      -webkit-tap-highlight-color: transparent;
      min-height: max(884px, 100dvh);
    }
    .ambient-shadow-light {
      box-shadow: 0px 12px 32px rgba(20, 29, 33, 0.04);
    }
    .pocket-glow {
      box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.6);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col pb-40 antialiased">

  <!-- TopAppBar -->
  <header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-white/70 backdrop-blur-xl border-b border-surface-container-high">
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 rounded-full overflow-hidden bg-primary-container">
        <img alt="DC" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBPT8W2Tj15ryhBg8RfuEDRVtzrzCufNn6d8PQEDhALkywq3aKnuhrjIccmccMaU5776Rct6S8qQ2G8YYRTWtuKkNROhKs15Q2O3ZxzageEoYRo18UQm3mVqX9N2Y1Vjgl4ZmvowPpA633h7SECMc2DRtHLq7PaltW1cq3z5zpRnRCd8D9vJ2AEdoc8SGv8gcRVtZCyDyKJTzn-XwxL6p5WTWgEV_-uacpJU4wS-sv14ajPYFWpWt4Gw9KyfkZHaX4FIOsPHh-Y7W0"/>
      </div>
      <h1 class="font-headline font-bold text-lg text-primary">Günlük Doz</h1>
    </div>
  </header>

  <main class="flex-1 px-6 pt-24 space-y-8 max-w-md mx-auto w-full">
    
    <!-- Motivation Card -->
    <section class="bg-surface rounded-[2rem] p-10 ambient-shadow-light border border-surface-container-high relative overflow-hidden">
      <div class="absolute -top-12 -right-12 w-48 h-48 bg-secondary/5 rounded-full blur-3xl"></div>
      
      <div class="relative z-10">
        <span class="text-xs font-bold text-secondary uppercase tracking-[0.2em] mb-4 block">Fütüristik Motivasyon</span>
        <blockquote class="text-[1.75rem] font-extrabold font-headline leading-tight text-on-surface italic mb-8 border-l-8 border-primary pl-6">
          "Bir hayal, eylemle birleştiğinde artık gelecek olur."
        </blockquote>
        <div class="text-right">
          <cite class="font-label font-bold text-on-surface-variant not-italic">— Dijital Küratör</cite>
        </div>
      </div>
    </section>

    <!-- Response History (Hybrid Bubble Design) -->
    <div class="space-y-4 px-2">
       <div class="bg-surface-container-high rounded-2xl rounded-tl-none p-4 text-sm font-medium text-on-surface-variant w-[85%] border border-surface-container-highest">
         Merhaba Nobita! Bugünkü ödevlerin için "Çeviri Sakızı" yardımı ister misin?
       </div>
       <div class="bg-pocket-bg rounded-2xl rounded-tr-none p-4 text-sm font-medium text-pocket-on w-[80%] ml-auto pocket-glow">
         Evet, özellikle İngilizce metni anlamakta zorlanıyorum.
       </div>
    </div>

  </main>

  <!-- Sticky Bottom Input (Pocket Dark) -->
  <div class="fixed bottom-24 left-0 w-full px-6 z-40">
    <div class="bg-pocket-bg rounded-full p-2 pl-6 flex items-center gap-3 pocket-glow border border-white/10">
      <input class="flex-1 bg-transparent border-none focus:ring-0 text-pocket-on placeholder:text-pocket-variant font-medium" placeholder="Dijital küratöre yaz..." type="text"/>
      <button class="w-12 h-12 rounded-full bg-primary flex items-center justify-center text-on-primary shadow-lg shadow-primary/20 active:scale-90 transition-transform">
        <span class="material-symbols-outlined font-bold">send</span>
      </button>
    </div>
  </div>

  <!-- BottomNavBar -->
  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 backdrop-blur-2xl border-t border-surface-container-high rounded-t-[2.5rem]">
    <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-colors" href="screen1_tasks.html">
      <span class="material-symbols-outlined text-2xl">widgets</span>
      <span class="font-label text-[10px] font-bold mt-1 uppercase tracking-wider">Bugün</span>
    </a>
    <a class="flex flex-col items-center justify-center text-primary px-5 py-1" href="#">
      <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
      <span class="font-label text-[10px] font-bold mt-1 uppercase tracking-wider">İlham</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-colors" href="screen3_focus_light.html">
      <span class="material-symbols-outlined text-2xl">timer</span>
      <span class="font-label text-[10px] font-bold mt-1 uppercase tracking-wider">Odak</span>
    </a>
  </nav>

</body>
</html>
