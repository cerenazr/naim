<!DOCTYPE html>
<html class="light" lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>4D Asistanım - Odaklanma (Light Pocket Hybrid)</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "background": "#f8fbff",
            "surface": "#ffffff",
            "surface-dim": "#f1f4f9",
            "surface-container": "#eff2f6",
            "surface-container-high": "#e9edf2",
            "primary": "#0061a7",
            "primary-container": "#d1e4ff",
            "on-primary": "#ffffff",
            "secondary": "#bc000c",
            "tertiary": "#745b00",
            "on-surface": "#141d21",
            "on-surface-variant": "#44474e",
            "pocket-bg": "#111125",
            "pocket-on": "#e2e0fc",
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans", "sans-serif"],
            "body": ["Be Vietnam Pro", "sans-serif"],
            "label": ["Be Vietnam Pro", "sans-serif"]
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      min-height: max(884px, 100dvh);
    }
    .timer-glow-light {
      text-shadow: 0 0 30px rgba(0, 97, 167, 0.15);
    }
    .pocket-glow {
      box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.6);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col pb-40">

  <header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-white/70 backdrop-blur-xl border-b border-surface-container-high">
    <div class="flex items-center gap-3">
      <h1 class="font-headline font-bold text-lg text-primary">Derin Odak</h1>
    </div>
  </header>

  <main class="flex-1 max-w-md mx-auto px-6 pt-24 space-y-12 w-full">
    
    <!-- Timer Section -->
    <section class="flex flex-col items-center">
      <div class="bg-primary/5 text-primary px-4 py-1 rounded-full text-xs font-bold tracking-widest mb-10 border border-primary/10">
        AKILLI OTURUM
      </div>
      
      <div class="relative w-72 h-72 bg-white rounded-full flex items-center justify-center shadow-[0_32px_64px_-16px_rgba(0,0,0,0.08)] border border-surface-container-high ring-8 ring-surface-container/30">
        <div class="text-[5.5rem] font-headline font-black text-primary leading-none tracking-tighter timer-glow-light">
          25<span class="text-[3rem] opacity-30">:00</span>
        </div>
      </div>
    </section>

    <!-- Controls (Pocket Hybrid) -->
    <section class="flex justify-center gap-6">
      <button class="w-16 h-16 rounded-full bg-surface border border-surface-container-high shadow-sm flex items-center justify-center hover:bg-surface-container transition-all">
        <span class="material-symbols-outlined text-on-surface-variant">stop</span>
      </button>

      <button class="w-24 h-24 rounded-[2.5rem] bg-pocket-bg pocket-glow flex items-center justify-center text-primary hover:scale-105 active:scale-95 transition-transform">
        <span class="material-symbols-outlined text-[3rem]" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
      </button>

      <button class="w-16 h-16 rounded-full bg-surface border border-surface-container-high shadow-sm flex items-center justify-center hover:bg-surface-container transition-all">
        <span class="material-symbols-outlined text-on-surface-variant">refresh</span>
      </button>
    </section>

    <!-- Stats Card -->
    <div class="bg-surface rounded-3xl p-6 border border-surface-container-high shadow-sm">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xs font-bold text-on-surface-variant uppercase tracking-widest">Bugünkü Puanın</h3>
        <span class="text-primary font-bold">120 XP</span>
      </div>
      <div class="w-full h-2 bg-surface-container-high rounded-full">
        <div class="w-3/4 h-full bg-primary rounded-full"></div>
      </div>
    </div>

  </main>

  <!-- BottomNavBar -->
  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 backdrop-blur-2xl border-t border-surface-container-high rounded-t-[2.5rem]">
    <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-colors" href="screen1_tasks.html">
      <span class="material-symbols-outlined text-2xl">widgets</span>
      <span class="font-label text-[10px] font-bold mt-1 uppercase tracking-wider">Bugün</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-colors" href="screen2_motivation.html">
      <span class="material-symbols-outlined text-2xl">auto_awesome</span>
      <span class="font-label text-[10px] font-bold mt-1 uppercase tracking-wider">İlham</span>
    </a>
    <a class="flex flex-col items-center justify-center text-primary px-5 py-1" href="#">
      <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">timer</span>
      <span class="font-label text-[10px] font-bold mt-1 uppercase tracking-wider">Odak</span>
    </a>
  </nav>

</body>
</html>
