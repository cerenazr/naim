<!DOCTYPE html>
<html class="dark" lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>4D Asistanım - Görev Listesi (Cosmic Pocket)</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#111125",
            "surface": "#111125",
            "surface-dim": "#111125",
            "surface-bright": "#37374d",
            "surface-container-lowest": "#0c0c1f",
            "surface-container-low": "#1a1a2e",
            "surface-container": "#1e1e32",
            "surface-container-high": "#28283d",
            "surface-container-highest": "#333348",
            
            "primary": "#84cfff",
            "primary-container": "#3ab4f2",
            "on-primary": "#00344c",
            "on-primary-container": "#004360",
            
            "secondary": "#ffb2b7",
            "secondary-container": "#9e0030",
            "on-secondary": "#67001c",
            "on-secondary-container": "#ffa7ae",
            
            "tertiary": "#e7c400",
            "tertiary-container": "#c6a800",
            "on-tertiary": "#3a3000",
            "on-tertiary-container": "#4a3e00",
            
            "on-surface": "#e2e0fc",
            "on-surface-variant": "#bec8d1",
            "outline": "#88929b",
            "outline-variant": "#3e4850",
            
            "error": "#ffb4ab",
            "on-error": "#690005"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans", "sans-serif"],
            "body": ["Be Vietnam Pro", "sans-serif"],
            "label": ["Be Vietnam Pro", "sans-serif"]
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      -webkit-tap-highlight-color: transparent;
      min-height: max(884px, 100dvh);
    }
    /* Ghost Border Fallback */
    .ghost-border {
      box-shadow: inset 0 0 0 1px rgba(62, 72, 80, 0.15); /* outline-variant at 15% */
    }
    .ambient-shadow {
      box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.4), 0px 0px 20px rgba(132, 207, 255, 0.05);
    }
    .interaction-glow:focus-within {
      box-shadow: 0 0 20px rgba(132, 207, 255, 0.3);
    }
  </style>
</head>
<body class="bg-background font-body text-on-surface antialiased selection:bg-primary/30">

  <!-- TopAppBar -->
  <header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-surface-container-low/60 backdrop-blur-[16px] ghost-border">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 bg-surface-container rounded-full flex items-center justify-center text-on-surface-variant group hover:bg-surface-bright transition-colors cursor-pointer">
        <span class="material-symbols-outlined text-2xl group-hover:text-primary transition-colors" data-icon="menu">menu</span>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-surface-container-highest rounded-full flex items-center justify-center text-on-surface shadow-sm cursor-pointer hover:bg-surface-bright transition-colors">
        <span class="material-symbols-outlined text-[20px]" data-icon="notifications" style="font-variation-settings: 'FILL' 1;">notifications</span>
      </div>
      <div class="w-10 h-10 rounded-full overflow-hidden ghost-border cursor-pointer hover:scale-105 transition-transform">
        <img alt="User profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCS3dRFjIuZ27b7g8CVjYWQ03Ftz4BOPsOvLZ4pE0r18MltAXtYyoaFi8x2QTGMk79ABMcoTpA9vDQ89STPzMKqCEYIJDJh503Cmp4SY6FB39U0nWz-630TpHZqk1tN9nnwQuHZCvA5YyQZ7DkHE7otP4A_ee8Nb8Zj1N-Gt3BqZQQRx1fVADf9L__YMXSGu4SRiYf-xk1UGBQ3Es42XrWk1UzgTmBezmdfL7ebwsoxBMei2pYBgBGW_DyKIGzGXZYwVn7F53vR4ck"/>
      </div>
    </div>
  </header>

  <main class="pt-24 pb-32 px-6 max-w-md mx-auto min-h-screen">
    
    <!-- Welcome Section (Intentional Asymmetry) -->
    <section class="mb-12 pr-8">
      <h2 class="text-[3.5rem] leading-[1.1] font-extrabold font-headline text-on-surface break-words mb-3">
        Hello,<br/><span class="text-primary bg-clip-text">Nobita.</span>
      </h2>
      <p class="font-bold text-sm text-on-surface-variant tracking-wider uppercase">Future operations ready.</p>
    </section>

    <!-- Task List Widget (Recessed Docking via surface tiers) -->
    <div class="bg-surface-container-lowest rounded-[1.5rem] p-6 ambient-shadow relative overflow-hidden group">
      <div class="flex items-center justify-between mb-8">
        <h3 class="text-xl font-bold font-headline text-secondary">Today's Objectives</h3>
      </div>
      
      <!-- No-Divider Rule implemented via flex spacing (spacing-4) -->
      <div class="space-y-4">
        
        <!-- Task Item 1 -->
        <label class="flex items-start gap-4 p-4 rounded-2xl bg-surface-container-low cursor-pointer hover:bg-surface-container transition-colors group/item relative">
          <!-- The source marker AI response style -->
          <div class="absolute left-0 top-1/2 -translate-y-1/2 w-[3px] h-8 bg-primary rounded-r-full"></div>
          
          <div class="relative flex items-center justify-center pt-1 ml-2">
            <input class="peer appearance-none w-6 h-6 rounded-full bg-surface-container-highest checked:bg-primary transition-all duration-300" type="checkbox"/>
            <span class="material-symbols-outlined absolute text-on-primary opacity-0 peer-checked:opacity-100 transition-opacity text-sm font-bold">check</span>
          </div>
          <div class="flex flex-col">
            <span class="text-base font-semibold text-on-surface peer-checked:line-through peer-checked:text-on-surface-variant transition-all">Equip Gravity Paint</span>
            <span class="text-sm font-body text-on-surface-variant">Check inventory before departure.</span>
          </div>
        </label>
        
        <!-- Task Item 2 -->
        <label class="flex items-start gap-4 p-4 rounded-2xl bg-surface-container-low cursor-pointer hover:bg-surface-container transition-colors group/item relative">
          <div class="absolute left-0 top-1/2 -translate-y-1/2 w-[3px] h-8 bg-primary rounded-r-full"></div>
          
          <div class="relative flex items-center justify-center pt-1 ml-2">
            <input checked class="peer appearance-none w-6 h-6 rounded-full bg-surface-container-highest checked:bg-primary transition-all duration-300" type="checkbox"/>
            <span class="material-symbols-outlined absolute text-on-primary opacity-0 peer-checked:opacity-100 transition-opacity text-sm font-bold">check</span>
          </div>
          <div class="flex flex-col">
            <span class="text-base font-semibold text-on-surface-variant line-through transition-all">Fix the Time Machine</span>
            <span class="text-sm font-body text-on-surface-variant">Completed at 08:30 AM</span>
          </div>
        </label>
        
      </div>
      
      <!-- Progress Indicator -->
      <div class="mt-6 pt-6 flex items-center justify-between">
        <div class="flex flex-col">
          <span class="text-xs font-bold font-label text-on-surface-variant uppercase tracking-widest">PROGRESS</span>
          <span class="text-sm font-bold text-primary">1 / 2 Synced</span>
        </div>
        <!-- Yellow Eureka Alert Style -->
        <div class="w-12 h-12 rounded-full bg-tertiary flex items-center justify-center text-on-tertiary shadow-[0_10px_20px_rgba(231,196,0,0.2)]">
          <span class="font-headline font-bold text-sm">50%</span>
        </div>
      </div>
    </div>

    <!-- The Gadget Drawer (Horizontal Scrolling List) -->
    <div class="mt-12">
      <h5 class="text-xs font-bold font-label text-secondary uppercase tracking-widest px-2 mb-4">Gadget Inventory</h5>
      <div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar px-2">
        <div class="shrink-0 flex flex-col items-center gap-2 w-20">
          <button class="w-16 h-16 rounded-full bg-gradient-to-br from-primary to-primary-container text-on-primary shadow-[inset_0_1px_1px_rgba(255,255,255,0.4)] ambient-shadow hover:scale-105 transition-transform flex items-center justify-center">
            <span class="material-symbols-outlined text-2xl">explore</span>
          </button>
          <span class="text-xs font-medium text-on-surface text-center">Anywhere Door</span>
        </div>
        
        <div class="shrink-0 flex flex-col items-center gap-2 w-20">
          <button class="w-16 h-16 rounded-full bg-surface-container-high text-on-surface ghost-border hover:bg-surface-bright transition-colors flex items-center justify-center">
            <span class="material-symbols-outlined text-2xl">menu_book</span>
          </button>
          <span class="text-xs font-medium text-on-surface text-center">Memory Bread</span>
        </div>

        <div class="shrink-0 flex flex-col items-center gap-2 w-20">
          <button class="w-16 h-16 rounded-full bg-surface-container-high text-on-surface ghost-border hover:bg-surface-bright transition-colors flex items-center justify-center">
            <span class="material-symbols-outlined text-2xl">flight_takeoff</span>
          </button>
          <span class="text-xs font-medium text-on-surface text-center">TakeCopter</span>
        </div>
      </div>
    </div>
    
  </main>

  <!-- The "Pocket" Input -->
  <div class="fixed bottom-24 left-0 w-full px-6 z-40">
    <!-- surface-container-highest, full roundedness, no borders, soft primary glow on focus-within -->
    <div class="bg-surface-container-highest/80 backdrop-blur-[20px] rounded-full p-2 pl-6 flex items-center gap-3 interaction-glow transition-shadow duration-300">
      <input class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface font-body font-medium placeholder:text-on-surface-variant text-base" placeholder="Ask the digital curator..." type="text"/>
      
      <!-- Gadget-FAB -->
      <button class="w-12 h-12 rounded-full bg-tertiary flex items-center justify-center text-on-tertiary shadow-[0_10px_20px_rgba(202,0,48,0.15)] active:scale-90 transition-transform">
        <span class="material-symbols-outlined font-bold text-xl">mic</span>
      </button>
    </div>
    <div class="text-center mt-2">
      <span class="text-xs font-body text-on-surface-variant opacity-80">Or say "Doraemon" to activate</span>
    </div>
  </div>

  <!-- BottomNavBar -->
  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-surface-container-lowest/80 backdrop-blur-[20px] ghost-border rounded-t-[2rem]">
    <!-- Active State -->
    <a class="flex flex-col items-center justify-center text-primary px-5 py-2 group" href="#">
      <span class="material-symbols-outlined text-2xl group-hover:-translate-y-1 transition-transform" style="font-variation-settings: 'FILL' 1;">widgets</span>
      <span class="font-label text-[11px] font-bold mt-1 tracking-wide">Hub</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:text-on-surface transition-colors group" href="screen2_motivation.html">
      <span class="material-symbols-outlined text-2xl group-hover:-translate-y-1 transition-transform">auto_awesome</span>
      <span class="font-label text-[11px] font-bold mt-1 tracking-wide">Spark</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:text-on-surface transition-colors group" href="screen3_focus_light.html">
      <span class="material-symbols-outlined text-2xl group-hover:-translate-y-1 transition-transform">timer</span>
      <span class="font-label text-[11px] font-bold mt-1 tracking-wide">Focus</span>
    </a>
  </nav>

</body>
</html>
