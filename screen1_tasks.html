<!DOCTYPE html>
<html class="light" lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>4D Asistanım - Görev Listesi (Light Pocket Hybrid)</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#f8fbff",
            "surface": "#ffffff",
            "surface-dim": "#f1f4f9",
            "surface-bright": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f4f7fa",
            "surface-container": "#eff2f6",
            "surface-container-high": "#e9edf2",
            "surface-container-highest": "#e3e8ee",
            
            "primary": "#0061a7",
            "primary-container": "#d1e4ff",
            "on-primary": "#ffffff",
            "on-primary-container": "#001d36",
            
            "secondary": "#bc000c",
            "secondary-container": "#ffdad5",
            "on-secondary": "#ffffff",
            "on-secondary-container": "#410001",
            
            "tertiary": "#745b00",
            "tertiary-container": "#ffe08b",
            "on-tertiary": "#ffffff",
            "on-tertiary-container": "#241a00",
            
            "on-surface": "#141d21",
            "on-surface-variant": "#44474e",
            "outline": "#74777f",
            "outline-variant": "#c4c7cf",
            
            "pocket-bg": "#111125",
            "pocket-on": "#e2e0fc",
            "pocket-variant": "#bec8d1",
            
            "error": "#ba1a1a",
            "on-error": "#ffffff"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans", "sans-serif"],
            "body": ["Be Vietnam Pro", "sans-serif"],
            "label": ["Be Vietnam Pro", "sans-serif"]
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      -webkit-tap-highlight-color: transparent;
      min-height: max(884px, 100dvh);
    }
    .ghost-border-light {
      box-shadow: inset 0 0 0 1px rgba(116, 119, 127, 0.1);
    }
    .ambient-shadow-light {
      box-shadow: 0px 12px 32px rgba(20, 29, 33, 0.04);
    }
    .pocket-glow {
      box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.6), 0px 0px 20px rgba(132, 207, 255, 0.1);
    }
  </style>
</head>
<body class="bg-background font-body text-on-surface antialiased">

  <!-- TopAppBar -->
  <header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-white/70 backdrop-blur-xl border-b border-surface-container-high">
    <div class="flex items-center gap-4">
       <h1 class="text-xl font-extrabold tracking-tight font-headline text-primary">4D Asistanım</h1>
    </div>
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-surface-container rounded-full flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors cursor-pointer">
        <span class="material-symbols-outlined text-[20px]" data-icon="notifications">notifications</span>
      </div>
      <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-container">
        <img alt="User" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCS3dRFjIuZ27b7g8CVjYWQ03Ftz4BOPsOvLZ4pE0r18MltAXtYyoaFi8x2QTGMk79ABMcoTpA9vDQ89STPzMKqCEYIJDJh503Cmp4SY6FB39U0nWz-630TpHZqk1tN9nnwQuHZCvA5YyQZ7DkHE7otP4A_ee8Nb8Zj1N-Gt3BqZQQRx1fVADf9L__YMXSGu4SRiYf-xk1UGBQ3Es42XrWk1UzgTmBezmdfL7ebwsoxBMei2pYBgBGW_DyKIGzGXZYwVn7F53vR4ck"/>
      </div>
    </div>
  </header>

  <main class="pt-24 pb-40 px-6 max-w-md mx-auto min-h-screen">
    
    <!-- Welcome Section -->
    <section class="mb-10">
      <div class="inline-flex items-center px-4 py-1 rounded-full bg-primary/5 text-primary text-xs font-bold tracking-widest mb-4">
        GELECEKTEN MESAJIN VAR 👋
      </div>
      <h2 class="text-[2.5rem] leading-[1.1] font-extrabold font-headline text-on-surface">
        Selam Nobita,<br/><span class="text-primary italic">Hadi başlayalım.</span>
      </h2>
    </section>

    <!-- Task List Widget (Light Mode Card) -->
    <div class="bg-surface rounded-[2rem] p-8 ambient-shadow-light border border-surface-container-high relative overflow-hidden group mb-8">
      <h3 class="text-xl font-bold font-headline text-on-surface mb-6">Bugünkü Hedefler</h3>
      <div class="space-y-4">
        <!-- Task 1 -->
        <label class="flex items-center gap-4 p-4 rounded-2xl bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all">
          <input class="w-6 h-6 rounded-full border-2 border-primary-container text-primary focus:ring-0 transition-all" type="checkbox"/>
          <span class="text-base font-semibold text-on-surface-variant">Hafıza Ekmeğini hazırla 🍞</span>
        </label>
        <!-- Task 2 -->
        <label class="flex items-center gap-4 p-4 rounded-2xl bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all">
          <input checked class="w-6 h-6 rounded-full border-2 border-primary-container text-primary focus:ring-0 transition-all" type="checkbox"/>
          <span class="text-base font-semibold text-on-surface-variant line-through opacity-50">Zaman Makinesini kontrol et</span>
        </label>
      </div>
    </div>

    <!-- The Pocket Portion (Dark Mode Contrast) -->
    <section class="bg-pocket-bg rounded-[2.5rem] p-8 pocket-glow relative overflow-hidden">
      <!-- Glow effect -->
      <div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/20 rounded-full blur-3xl"></div>
      
      <div class="relative z-10">
        <h4 class="text-pocket-on font-headline font-bold text-lg mb-4 flex items-center gap-2">
          <span class="material-symbols-outlined text-primary">pocket</span>
          Gelecek Cebim
        </h4>
        <div class="grid grid-cols-2 gap-4">
          <button class="bg-white/5 hover:bg-white/10 rounded-2xl p-4 flex flex-col items-center transition-colors border border-white/5">
            <span class="material-symbols-outlined text-primary text-3xl mb-2">explore</span>
            <span class="text-pocket-on text-xs font-bold uppercase tracking-widest">Anywhere Door</span>
          </button>
          <button class="bg-white/5 hover:bg-white/10 rounded-2xl p-4 flex flex-col items-center transition-colors border border-white/5">
            <span class="material-symbols-outlined text-secondary text-3xl mb-2">flight_takeoff</span>
            <span class="text-pocket-on text-xs font-bold uppercase tracking-widest">TakeCopter</span>
          </button>
        </div>
      </div>
    </section>
    
  </main>

  <!-- The "Pocket" Input Bar (Dark Mode Contrast) -->
  <div class="fixed bottom-24 left-0 w-full px-6 z-40">
    <div class="bg-pocket-bg rounded-full p-2 pl-6 flex items-center gap-3 pocket-glow border border-white/10">
      <input class="flex-1 bg-transparent border-none focus:ring-0 text-pocket-on placeholder:text-pocket-variant font-medium" placeholder="4D Cebine bir şeyler sor..." type="text"/>
      <button class="w-12 h-12 rounded-full bg-primary flex items-center justify-center text-on-primary shadow-lg shadow-primary/20 active:scale-90 transition-transform">
        <span class="material-symbols-outlined font-bold">send</span>
      </button>
    </div>
  </div>

  <!-- BottomNavBar (Light Mode Gradient/Blur) -->
  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 backdrop-blur-2xl border-t border-surface-container-high rounded-t-[2.5rem]">
    <a class="flex flex-col items-center justify-center text-primary px-5 py-1" href="#">
      <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">widgets</span>
      <span class="font-label text-[10px] font-bold mt-1 uppercase tracking-wider">Bugün</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-colors" href="screen2_motivation.html">
      <span class="material-symbols-outlined text-2xl">auto_awesome</span>
      <span class="font-label text-[10px] font-bold mt-1 uppercase tracking-wider">İlham</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-colors" href="screen3_focus_light.html">
      <span class="material-symbols-outlined text-2xl">timer</span>
      <span class="font-label text-[10px] font-bold mt-1 uppercase tracking-wider">Odak</span>
    </a>
  </nav>

</body>
</html>
